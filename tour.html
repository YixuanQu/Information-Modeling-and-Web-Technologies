<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LMML — Rome Cinema Walk · Tour</title>
  <meta name="description" content="Interactive tour of iconic movie locations in Rome." />

  <!-- Leaflet map library (loaded from CDN) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <!-- data-theme drives the modern / vintage look. Set by tour.js -->
  <div class="tour" id="tour" data-theme="modern">

    <!-- ============ HEADER ============ -->
    <header class="header">
      <div class="header__left">
        <a href="index.html" class="header__home">
          <!-- home icon -->
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round" class="icon">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            <polyline points="9 22 9 12 15 12 15 22"></polyline>
          </svg>
          <span class="hide-sm">Home</span>
        </a>
        <div class="header__sep"></div>
        <h1 class="header__title">LMML: Rome Cinema Walk</h1>
      </div>

      <div class="header__right">
        <!-- ===== Content switchers ===== -->
        <div class="switchers">
          <!-- Level of detail -->
          <div class="switcher">
            <div class="switcher__label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" class="icon icon--sm">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
              </svg>
              <span>Level of Detail</span>
            </div>
            <div class="segmented" data-group="detail">
              <button type="button" data-value="brief">Brief</button>
              <button type="button" data-value="mid">Mid</button>
              <button type="button" data-value="long">Long</button>
            </div>
          </div>

          <!-- Audience tone -->
          <div class="switcher">
            <div class="switcher__label">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                   stroke-linecap="round" stroke-linejoin="round" class="icon icon--sm">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                <circle cx="9" cy="7" r="4"></circle>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
              </svg>
              <span>Audience Tone</span>
            </div>
            <div class="segmented" data-group="tone">
              <button type="button" data-value="young">Young</button>
              <button type="button" data-value="adult">Adult</button>
              <button type="button" data-value="scholar">Scholar</button>
            </div>
          </div>
        </div>

        <div class="header__sep hide-sm"></div>

        <!-- ===== Theme switcher ===== -->
        <div class="segmented segmented--theme" data-group="theme">
          <button type="button" data-value="modern">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" class="icon icon--sm">
              <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
              <line x1="8" y1="21" x2="16" y2="21"></line>
              <line x1="12" y1="17" x2="12" y2="21"></line>
            </svg>
            <span>Modern Screen</span>
          </button>
          <button type="button" data-value="vintage">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" class="icon icon--sm">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
            <span>XIX Century Print</span>
          </button>
          <button type="button" data-value="noir">
            <!-- moon icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" class="icon icon--sm">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
            </svg>
            <span>Cinema Noir</span>
          </button>
          <button type="button" data-value="technicolor">
            <!-- sun icon -->
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" class="icon icon--sm">
              <circle cx="12" cy="12" r="5"></circle>
              <line x1="12" y1="1" x2="12" y2="3"></line>
              <line x1="12" y1="21" x2="12" y2="23"></line>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
              <line x1="1" y1="12" x2="3" y2="12"></line>
              <line x1="21" y1="12" x2="23" y2="12"></line>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
            </svg>
            <span>Golden Age</span>
          </button>
        </div>
      </div>
    </header>

    <!-- ============ MAIN CONTENT ============ -->
    <div class="main">
      <!-- Left: map + navigation (golden-ratio width ≈ 38.2%) -->
      <div class="map-pane">
        <div id="map" class="map"></div>

        <div class="nav">
          <button type="button" id="prevBtn" class="nav__btn" title="Previous location (←)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" class="icon">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
            <span>Previous</span>
          </button>

          <div class="nav__counter">
            <span id="navCurrent">1</span>
            <span class="nav__counter-total"> / <span id="navTotal">15</span></span>
          </div>

          <button type="button" id="nextBtn" class="nav__btn" title="Next location (→)">
            <span>Next</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" class="icon">
              <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
          </button>
        </div>
      </div>

      <!-- Right: scrollable location content (rendered by tour.js) -->
      <div class="content-pane">
        <div class="content" id="content"></div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/tour.js"></script>
</body>
</html>
