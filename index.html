<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LMML — Rome Cinema Walk</title>
  <meta name="description" content="Explore iconic movie locations in Rome with an interactive map and tailored content, perfect for film enthusiasts and scholars seeking a cinematic journey." />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <!-- ============ COVER PAGE ============ -->
  <div class="cover">
    <!-- Background image -->
    <div class="cover__bg"></div>
    <!-- Dark gradient overlay -->
    <div class="cover__overlay"></div>

    <!-- Content -->
    <div class="cover__content fade-up">
      <div class="cover__title-block">
        <p class="cover__eyebrow">Digital Companion</p>
        <h1 class="cover__title">LMML</h1>
        <div class="cover__divider"></div>

        <h2 class="cover__subtitle">Rome Cinema Walk</h2>

        <p class="cover__lead">
          An academic exploration of Rome's cinematic landscape.
          Journey through 15 iconic locations where cinema and history converge.
        </p>
      </div>

      <!-- Call to action -->
      <a class="cover__cta" href="tour.html?loc=1">
        <span>Begin Tour</span>
        <!-- chevron-right icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round" class="icon">
          <polyline points="9 18 15 12 9 6"></polyline>
        </svg>
      </a>

      <!-- Footer info -->
      <div class="cover__footer">
        <p>15 Locations · Academic Research Project · 2026</p>
        <p class="cover__footer-hint">Use &larr; &rarr; arrow keys to navigate between locations</p>
      </div>
    </div>
  </div>
</body>
</html>
